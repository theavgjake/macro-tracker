<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroLog</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f565;
    --accent2: #65f5c8;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #f56565;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .app { width: 100%; max-width: 480px; position: relative; z-index: 1; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-top: 8px;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 100px;
  }

  /* Setup Panel */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }

  .setup-panel h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .field-group { margin-bottom: 12px; }

  .field-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field-group input:focus { border-color: var(--accent); }
  .field-group input::placeholder { color: var(--muted); }

  .save-btn {
    width: 100%;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s;
  }

  .save-btn:hover { opacity: 0.85; }

  /* Mic Section */
  .mic-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 0 28px;
  }

  .mic-ring {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mic-ring::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    transition: all 0.3s;
  }

  .mic-ring.listening::before {
    border-color: var(--accent);
    box-shadow: 0 0 0 12px rgba(200,245,101,0.06), 0 0 0 24px rgba(200,245,101,0.03);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 12px rgba(200,245,101,0.06), 0 0 0 24px rgba(200,245,101,0.03); }
    50% { box-shadow: 0 0 0 18px rgba(200,245,101,0.1), 0 0 0 36px rgba(200,245,101,0.04); }
  }

  .mic-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    z-index: 1;
  }

  .mic-btn:hover { border-color: var(--accent); background: var(--surface2); }

  .mic-btn.listening {
    background: var(--accent);
    border-color: var(--accent);
  }

  .mic-btn svg { transition: all 0.25s; }
  .mic-btn.listening svg path { fill: #0a0a0a; }

  .mic-label {
    margin-top: 20px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    min-height: 20px;
    transition: color 0.2s;
  }

  .mic-label.active { color: var(--accent); }

  /* Transcript box */
  .transcript-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 16px;
    min-height: 70px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    display: none;
  }

  .transcript-box.visible { display: block; }

  .transcript-box .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  /* Log button */
  .log-btn {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    letter-spacing: 0.3px;
  }

  .log-btn.visible { display: block; }
  .log-btn:hover { background: var(--accent); color: #0a0a0a; }
  .log-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 20px;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .result-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card .food-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
    line-height: 1.4;
  }

  .macros-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .macro-cell {
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .macro-cell .val {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }

  .macro-cell .unit {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }

  .macro-cell .name {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .macro-cell:first-child .val { color: var(--accent2); }

  .result-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 8px;
    text-align: center;
  }

  .result-status.success { background: rgba(101,245,200,0.08); color: var(--accent2); }
  .result-status.error { background: rgba(245,101,101,0.08); color: var(--danger); }
  .result-status.loading { background: var(--surface2); color: var(--muted); }

  /* Log history */
  .history-section { margin-top: 32px; }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .history-header h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .clear-btn {
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--danger); }

  .history-list { display: flex; flex-direction: column; gap: 10px; }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideUp 0.3s ease;
  }

  .history-item .time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 42px;
  }

  .history-item .food {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item .cals {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
    white-space: nowrap;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 12px 24px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent2); color: var(--accent2); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* Setup toggle */
  .setup-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 20px;
    background: none;
    border: none;
    font-family: 'Syne', sans-serif;
    padding: 0;
  }

  .setup-toggle:hover { color: var(--text); }

  .chevron { transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }

  .not-supported {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Macro<span>Log</span></div>
    <div class="date-badge" id="dateBadge"></div>
  </header>

  <!-- Setup toggle -->
  <button class="setup-toggle" id="setupToggle" onclick="toggleSetup()">
    ⚙ API Setup <span class="chevron" id="chevron">▾</span>
  </button>

  <!-- Setup Panel -->
  <div class="setup-panel" id="setupPanel">
    <h3>Configuration</h3>

    <div class="field-group">
      <label>Claude API Key</label>
      <input type="password" id="claudeKey" placeholder="sk-ant-..." />
    </div>

    <div class="field-group">
      <label>Google Sheets ID</label>
      <input type="text" id="sheetId" placeholder="Paste your Sheet ID here" />
    </div>

    <div class="field-group">
      <label>Google Sheets API Key</label>
      <input type="password" id="sheetsKey" placeholder="Your Google API key" />
    </div>

    <button class="save-btn" onclick="saveConfig()">Save Configuration</button>

    <p style="margin-top:14px; font-size:11px; color: var(--muted); font-family:'DM Mono',monospace; line-height:1.7;">
      Keys are stored only in your browser's localStorage — never sent anywhere except directly to each API.
    </p>
  </div>

  <!-- Mic Section -->
  <div class="mic-section">
    <div class="mic-ring" id="micRing">
      <button class="mic-btn" id="micBtn" onclick="toggleListening()">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
          <path id="micIcon" d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z" fill="#666"/>
          <path d="M19 11a7 7 0 0 1-14 0M12 18v4M8 22h8" stroke="#666" stroke-width="1.8" stroke-linecap="round" id="micLines"/>
        </svg>
      </button>
    </div>
    <div class="mic-label" id="micLabel">tap to speak</div>
  </div>

  <!-- Transcript -->
  <div class="transcript-box" id="transcriptBox">
    <div class="label">You said</div>
    <div id="transcriptText"></div>
  </div>

  <!-- Log button -->
  <button class="log-btn" id="logBtn" onclick="processAndLog()">
    Analyze & Log →
  </button>

  <!-- Result Card -->
  <div class="result-card" id="resultCard">
    <div class="food-name" id="foodName"></div>
    <div class="macros-grid">
      <div class="macro-cell">
        <div class="val" id="rCalories">—</div>
        <div class="unit">kcal</div>
        <div class="name">Calories</div>
      </div>
      <div class="macro-cell">
        <div class="val" id="rProtein">—</div>
        <div class="unit">g</div>
        <div class="name">Protein</div>
      </div>
      <div class="macro-cell">
        <div class="val" id="rCarbs">—</div>
        <div class="unit">g</div>
        <div class="name">Carbs</div>
      </div>
      <div class="macro-cell">
        <div class="val" id="rFat">—</div>
        <div class="unit">g</div>
        <div class="name">Fat</div>
      </div>
    </div>
    <div class="result-status loading" id="resultStatus">Logging to Google Sheets...</div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-header">
      <h2>Today's Log</h2>
      <button class="clear-btn" onclick="clearHistory()">clear</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let recognition = null;
let isListening = false;
let transcript = '';
let sessionLog = JSON.parse(localStorage.getItem('macroLog_session') || '[]');

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Date badge
  const now = new Date();
  document.getElementById('dateBadge').textContent =
    now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

  // Load saved config
  document.getElementById('claudeKey').value = localStorage.getItem('ml_claude') || '';
  document.getElementById('sheetId').value = localStorage.getItem('ml_sheetId') || '';
  document.getElementById('sheetsKey').value = localStorage.getItem('ml_sheetsKey') || '';

  // Auto-collapse setup if already configured
  if (localStorage.getItem('ml_claude') && localStorage.getItem('ml_sheetId')) {
    toggleSetup(false);
  }

  // Speech API check
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    document.querySelector('.mic-section').innerHTML =
      `<div class="not-supported">Voice input is not supported in this browser.<br>Please use Chrome on Android.</div>`;
  } else {
    setupSpeech();
  }

  renderHistory();
});

// ── Setup Panel ────────────────────────────────────────────────────────────
let setupOpen = true;

function toggleSetup(forceState) {
  setupOpen = forceState !== undefined ? forceState : !setupOpen;
  document.getElementById('setupPanel').style.display = setupOpen ? 'block' : 'none';
  document.getElementById('chevron').classList.toggle('open', setupOpen);
}

function saveConfig() {
  localStorage.setItem('ml_claude', document.getElementById('claudeKey').value.trim());
  localStorage.setItem('ml_sheetId', document.getElementById('sheetId').value.trim());
  localStorage.setItem('ml_sheetsKey', document.getElementById('sheetsKey').value.trim());
  showToast('Configuration saved', 'success');
  toggleSetup(false);
}

// ── Speech Recognition ─────────────────────────────────────────────────────
function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    transcript = final || interim;
    document.getElementById('transcriptText').textContent = transcript;
    document.getElementById('transcriptBox').classList.add('visible');
  };

  recognition.onend = () => {
    setListeningState(false);
    if (transcript.trim()) {
      document.getElementById('logBtn').classList.add('visible');
    }
  };

  recognition.onerror = (e) => {
    setListeningState(false);
    showToast('Mic error: ' + e.error, 'error');
  };
}

function toggleListening() {
  if (isListening) {
    recognition.stop();
  } else {
    transcript = '';
    document.getElementById('transcriptText').textContent = '';
    document.getElementById('transcriptBox').classList.remove('visible');
    document.getElementById('logBtn').classList.remove('visible');
    document.getElementById('resultCard').classList.remove('visible');
    recognition.start();
    setListeningState(true);
  }
}

function setListeningState(active) {
  isListening = active;
  document.getElementById('micBtn').classList.toggle('listening', active);
  document.getElementById('micRing').classList.toggle('listening', active);
  const label = document.getElementById('micLabel');
  label.textContent = active ? 'listening...' : 'tap to speak';
  label.classList.toggle('active', active);

  // Icon color
  const path = document.getElementById('micIcon');
  const lines = document.getElementById('micLines');
  if (active) {
    path.setAttribute('fill', '#0a0a0a');
    lines.setAttribute('stroke', '#0a0a0a');
  } else {
    path.setAttribute('fill', '#666');
    lines.setAttribute('stroke', '#666');
  }
}

// ── Process & Log ──────────────────────────────────────────────────────────
async function processAndLog() {
  const claudeKey = localStorage.getItem('ml_claude');
  if (!claudeKey) { showToast('Add your Claude API key first', 'error'); return; }
  if (!transcript.trim()) { showToast('Nothing to log', 'error'); return; }

  const btn = document.getElementById('logBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  // Show result card
  const card = document.getElementById('resultCard');
  card.classList.add('visible');
  document.getElementById('resultStatus').className = 'result-status loading';
  document.getElementById('resultStatus').textContent = 'Asking Claude...';
  ['rCalories','rProtein','rCarbs','rFat'].forEach(id => document.getElementById(id).textContent = '—');
  document.getElementById('foodName').textContent = transcript;

  try {
    // 1. Ask Claude for macros
    const macros = await getMacros(claudeKey, transcript);

    // Update UI
    document.getElementById('rCalories').textContent = macros.calories;
    document.getElementById('rProtein').textContent = macros.protein;
    document.getElementById('rCarbs').textContent = macros.carbs;
    document.getElementById('rFat').textContent = macros.fat;
    document.getElementById('foodName').textContent = macros.description || transcript;

    // 2. Log to Sheets (if configured)
    const sheetId = localStorage.getItem('ml_sheetId');
    const sheetsKey = localStorage.getItem('ml_sheetsKey');

    if (sheetId && sheetsKey) {
      document.getElementById('resultStatus').textContent = 'Logging to Google Sheets...';
      await logToSheets(sheetId, sheetsKey, macros, transcript);
      document.getElementById('resultStatus').className = 'result-status success';
      document.getElementById('resultStatus').textContent = '✓ Logged to Google Sheets';
    } else {
      document.getElementById('resultStatus').className = 'result-status loading';
      document.getElementById('resultStatus').textContent = 'Add Sheets config to auto-log';
    }

    // Add to session history
    const entry = {
      time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
      food: macros.description || transcript,
      calories: macros.calories,
      protein: macros.protein,
      carbs: macros.carbs,
      fat: macros.fat
    };
    sessionLog.unshift(entry);
    localStorage.setItem('macroLog_session', JSON.stringify(sessionLog));
    renderHistory();

  } catch (err) {
    document.getElementById('resultStatus').className = 'result-status error';
    document.getElementById('resultStatus').textContent = '✗ ' + err.message;
    showToast(err.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Analyze & Log →';
}

async function getMacros(apiKey, food) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: `You are a nutrition expert. When given a food description, return ONLY a JSON object with these exact keys: description (cleaned food description, max 60 chars), calories (integer), protein (integer grams), carbs (integer grams), fat (integer grams). Use best estimates. No markdown, no explanation, just the JSON.`,
      messages: [{ role: 'user', content: food }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Claude API error ' + response.status);
  }

  const data = await response.json();
  const text = data.content[0].text.trim();
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function logToSheets(sheetId, apiKey, macros, rawInput) {
  const timestamp = new Date().toLocaleString('en-US');
  const values = [[timestamp, rawInput, macros.description, macros.calories, macros.protein, macros.carbs, macros.fat]];

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Sheet1!A:G:append?valueInputOption=USER_ENTERED&key=${apiKey}`;

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ values })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Sheets API error ' + res.status);
  }
}

// ── History ────────────────────────────────────────────────────────────────
function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');

  if (!sessionLog.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = sessionLog.map(e => `
    <div class="history-item">
      <div class="time">${e.time}</div>
      <div class="food">${e.food}</div>
      <div class="cals">${e.calories} kcal</div>
    </div>
  `).join('');
}

function clearHistory() {
  sessionLog = [];
  localStorage.removeItem('macroLog_session');
  renderHistory();
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
